title: BerryCrush
description: OpenAPI-driven BDD testing framework for API testing
url: "https://berrycrush.org"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge

# Theme settings
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
  - .github

# Site navigation
nav_links:
  - title: Documentation
    url: https://doc.berrycrush.org
  - title: VS Code
    url: https://vscode.berrycrush.org
  - title: IntelliJ
    url: https://intellij.berrycrush.org
  - title: GitHub
    url: https://github.com/BerryCrush/berrycrush
